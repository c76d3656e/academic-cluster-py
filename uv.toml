# uv configuration for academic-cluster
# See: https://github.com/astral-sh/uv

[tool.uv]
# Use Python 3.10+ for compatibility
python-version = "3.10"

# Dev dependencies group
dev-dependencies = [
    "black>=24.10.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "pre-commit>=4.0.0",
    "ipykernel>=6.29.0",
    "jupyter>=1.11.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
]

# Package index configuration
[tool.uv.index]
# Use PyPI as default
default = "https://pypi.org/simple"

# Optional: Add private or alternative indexes
# [tool.uv.index.my-private]
# url = "https://my-private-index.com/simple"

# Resolution settings
[tool.uv.resolution]
# Prefer newer versions
strategy = "highest"

# Build settings
[tool.uv.build]
# Use hatchling as build backend
build-backend = "hatchling.build"
